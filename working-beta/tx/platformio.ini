; ============================================================
;  VOID — Remote Controller
;  Board: Seeed Studio XIAO ESP32C3
; ============================================================
[env:xiaoesp32c3]
platform  = espressif32
board     = seeed_xiao_esp32c3
framework = arduino

monitor_speed = 115200
upload_speed  = 921600
upload_port   = COM7

lib_deps =
    adafruit/Adafruit SSD1306 @ ^2.5.10
    adafruit/Adafruit GFX Library @ ^1.11.9